<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Case Kisses Content Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=DM+Serif+Display&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --pink: #ec4899;
    --pink-dark: #be123c;
    --pink-soft: #fce7f3;
    --pink-border: #fbcfe8;
    --ink: #3f3f46;
    --muted: #71717a;
    --tiktok: #111827;
    --instagram: #ec4899;
    --both: #a855f7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "DM Sans", -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #fde7f3 0%, #fef3f9 45%, #fdf6e9 100%);
    min-height: 100vh;
    color: var(--ink);
    padding: 24px 16px 96px;
  }
  h1, h2, h3 { font-family: "DM Serif Display", Georgia, serif; font-weight: 400; }

  .container { max-width: 1240px; margin: 0 auto; }

  header.page-head { text-align: center; margin-bottom: 22px; }
  header.page-head h1 { font-size: 36px; color: var(--pink-dark); }
  header.page-head p { color: var(--muted); font-size: 14px; margin-top: 4px; }

  .toolbar {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .toolbar .range {
    font-family: "DM Serif Display", serif;
    font-size: 20px; color: var(--pink-dark); min-width: 240px; text-align: center;
  }
  button {
    font-family: inherit; cursor: pointer; border: none;
    border-radius: 999px; transition: all .15s ease;
  }
  .nav-btn {
    background: #fff; color: var(--pink-dark);
    border: 1.5px solid var(--pink-border);
    padding: 9px 16px; font-size: 14px; font-weight: 500;
  }
  .nav-btn:hover { background: var(--pink-soft); }
  .today-btn {
    background: linear-gradient(135deg, var(--pink) 0%, #f43f5e 100%);
    color: #fff; padding: 9px 18px; font-size: 14px; font-weight: 700;
  }
  .today-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(236,72,153,.3); }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 22px; }
  .chip {
    background: #fff; border: 1.5px solid var(--pink-border);
    color: var(--pink-dark); padding: 7px 14px; font-size: 12px; font-weight: 600;
  }
  .chip:hover { background: var(--pink); color: #fff; border-color: var(--pink); }

  .grid-scroll { overflow-x: auto; padding-bottom: 8px; }
  .grid {
    display: grid; grid-template-columns: repeat(7, minmax(150px, 1fr));
    gap: 10px; min-width: 980px;
  }
  .day-col { display: flex; flex-direction: column; gap: 8px; }
  .day-head {
    text-align: center; padding: 8px 4px; border-radius: 12px;
    background: #fff; border: 1.5px solid var(--pink-border);
  }
  .day-head .dow { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .day-head .date { font-family: "DM Serif Display", serif; font-size: 17px; color: var(--ink); }
  .day-head.is-today { background: var(--pink); border-color: var(--pink); }
  .day-head.is-today .dow, .day-head.is-today .date { color: #fff; }

  .slot {
    border-radius: 12px; padding: 8px; min-height: 96px;
    border: 1.5px solid transparent; display: flex; flex-direction: column;
  }
  .slot .slot-label { font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; opacity: .7; margin-bottom: 6px; }
  .tint-am  { background: #fef9c3; border-color: #fde68a; }
  .tint-mid { background: #fce7f3; border-color: #fbcfe8; }
  .tint-pm  { background: #ede9fe; border-color: #ddd6fe; }

  .add-slot {
    flex: 1; width: 100%; background: transparent;
    border: 2px dashed rgba(0,0,0,.15); border-radius: 10px;
    color: var(--muted); font-size: 13px; font-weight: 600; min-height: 60px;
  }
  .add-slot:hover { border-color: var(--pink); color: var(--pink); background: rgba(255,255,255,.5); }

  .card {
    position: relative; background: #fff; border-radius: 10px;
    padding: 10px 10px 10px 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06);
    cursor: pointer; overflow: hidden;
  }
  .card::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
  }
  .card.pf-TikTok::before    { background: var(--tiktok); }
  .card.pf-Instagram::before { background: var(--instagram); }
  .card.pf-Both::before      { background: var(--both); }
  .card .c-type { font-size: 13px; font-weight: 700; color: var(--ink); line-height: 1.25; }
  .card .c-product { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .card .c-meta { display: flex; align-items: center; gap: 6px; margin-top: 7px; flex-wrap: wrap; }
  .card .c-status {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 999px;
  }
  .card .c-status.st-planned   { background: #e4e4e7; color: #3f3f46; }
  .card .c-status.st-confirmed { background: #d1fae5; color: #047857; }
  .card .c-status.st-scheduled { background: #dbeafe; color: #1d4ed8; }
  .card .c-status.st-posted    { background: #111827; color: #f9fafb; }
  .card .c-vp {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 999px; background: #1e1b2e; color: #f5d5e6;
  }
  .card .c-video {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 999px; background: #d1fae5; color: #047857;
    max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card .c-filename {
    display: flex; align-items: center; gap: 6px; margin-top: 8px;
    background: #f4f4f5; color: #52525b;
    padding: 4px 4px 4px 8px; border-radius: 6px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 11px; font-weight: 600;
    transition: background .15s ease, color .15s ease;
  }
  .card .c-filename .fn-text {
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card .c-filename .fn-copy {
    width: 22px; height: 22px; padding: 0; flex-shrink: 0;
    border: 1px solid #d4d4d8; background: #fff; color: #52525b;
    border-radius: 5px; font-size: 11px; line-height: 1;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .card .c-filename .fn-copy:hover { background: #e4e4e7; }
  .card .c-filename.copied { background: #d1fae5; color: #047857; }
  .card .c-filename.copied .fn-copy { background: #10b981; color: #fff; border-color: #10b981; }

  .filename-display {
    background: #f4f4f5; color: #3f3f46;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 13.5px; font-weight: 600;
    padding: 12px 14px; border-radius: 8px; border: 1px solid #e4e4e7;
    word-break: break-all;
  }
  .card.is-confirmed { border: 1.5px solid #10b981; box-shadow: 0 2px 8px rgba(16,185,129,.18); }
  .card.is-scheduled { border: 1.5px solid #3b82f6; box-shadow: 0 2px 8px rgba(59,130,246,.18); }
  .card.is-posted .c-type,
  .card.is-posted .c-product { text-decoration: line-through; color: #111827; }
  .card.is-posted { opacity: .55; }

  /* Sound source toggle (radio-style buttons) */
  .toggle-row { display: flex; gap: 8px; }
  .toggle-row label {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 10px 12px; font-size: 13px; font-weight: 600; cursor: pointer;
    border: 1.5px solid var(--pink-border); border-radius: 10px;
    background: #fff; color: var(--muted); transition: all .15s ease;
    margin-bottom: 0;
  }
  .toggle-row label.active { background: var(--pink-soft); border-color: var(--pink); color: var(--pink-dark); }
  .toggle-row input { display: none; }

  /* File input — styled "browse" button */
  .file-row { display: flex; align-items: center; gap: 8px; }
  .file-row .file-btn {
    background: #fff; color: var(--pink-dark); border: 1.5px solid var(--pink-border);
    padding: 9px 14px; font-size: 13px; font-weight: 600; border-radius: 10px;
    cursor: pointer; white-space: nowrap;
  }
  .file-row .file-btn:hover { background: var(--pink-soft); }
  .file-row .file-name { font-size: 12.5px; color: var(--muted); flex: 1; word-break: break-all; }
  .file-row input[type="file"] { display: none; }

  /* Export button + toast */
  .export-btn {
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    color: #fff; padding: 9px 16px; font-size: 14px; font-weight: 700;
  }
  .export-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(16,185,129,.3); }
  .btn-confirm {
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    color: #fff; padding: 12px 18px; font-size: 15px; font-weight: 700;
  }
  .btn-confirm:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(16,185,129,.3); }
  .toast {
    position: fixed; left: 50%; bottom: 96px; transform: translateX(-50%) translateY(20px);
    background: #111827; color: #fff; padding: 12px 20px; border-radius: 999px;
    font-size: 14px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,.25);
    opacity: 0; pointer-events: none; transition: opacity .25s ease, transform .25s ease;
    z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }

  .card-actions {
    position: absolute; top: 6px; right: 6px; display: flex; gap: 4px;
    opacity: 0; transition: opacity .15s ease;
  }
  .card:hover .card-actions { opacity: 1; }
  .card-actions button {
    width: 24px; height: 24px; border-radius: 6px; font-size: 12px;
    background: #fff; border: 1px solid var(--pink-border); color: var(--pink-dark);
    display: flex; align-items: center; justify-content: center; line-height: 1; padding: 0;
  }
  .card-actions button:hover { background: var(--pink); color: #fff; border-color: var(--pink); }

  .overlay {
    position: fixed; inset: 0; background: rgba(40,10,30,.55);
    display: none; align-items: center; justify-content: center; padding: 20px; z-index: 100;
  }
  .overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 20px; width: 100%; max-width: 480px;
    max-height: 90vh; overflow-y: auto; padding: 26px; box-shadow: 0 20px 60px rgba(0,0,0,.25);
  }
  .modal h2 { font-size: 22px; color: var(--pink-dark); margin-bottom: 2px; }
  .modal .ctx { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 700; color: var(--pink-dark); margin-bottom: 6px; }
  .field select, .field input, .field textarea {
    width: 100%; padding: 10px 12px; font-family: inherit; font-size: 14px;
    border: 1.5px solid var(--pink-border); border-radius: 10px; background: #fff; color: var(--ink);
  }
  .field select:focus, .field input:focus, .field textarea:focus {
    outline: none; border-color: var(--pink); box-shadow: 0 0 0 3px rgba(236,72,153,.12);
  }
  .field textarea { resize: vertical; min-height: 70px; }
  .field textarea.vp { min-height: 110px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12.5px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
  .btn-primary {
    flex: 1; background: linear-gradient(135deg, var(--pink) 0%, #f43f5e 100%);
    color: #fff; padding: 12px; font-size: 15px; font-weight: 700;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(236,72,153,.3); }
  .btn-ghost { background: #f4f4f5; color: var(--ink); padding: 12px 18px; font-size: 15px; font-weight: 600; }
  .btn-ghost:hover { background: #e4e4e7; }
  .btn-danger { background: #fee2e2; color: #b91c1c; padding: 12px 18px; font-size: 15px; font-weight: 600; }
  .btn-danger:hover { background: #fecaca; }

  .detail-row { display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f4f4f5; font-size: 14px; }
  .detail-row .k { font-weight: 700; color: var(--pink-dark); min-width: 92px; }
  .detail-row .v { color: var(--ink); white-space: pre-wrap; word-break: break-word; flex: 1; }

  .vp-label {
    font-size: 12px; font-weight: 700; color: var(--pink-dark);
    margin: 16px 0 6px; display: flex; align-items: center; justify-content: space-between;
  }
  .code-box {
    background: #1e1b2e; color: #f5d5e6;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12.5px; line-height: 1.55; padding: 14px; border-radius: 10px;
    white-space: pre-wrap; word-break: break-word; max-height: 260px; overflow-y: auto;
    border: 1px solid #3b2f4a; margin: 0;
  }
  .copy-btn {
    background: #fbbf24; color: #78350f; padding: 6px 12px; font-size: 12px;
    font-weight: 700; border-radius: 6px;
  }
  .copy-btn:hover { background: #f59e0b; }
  .copy-btn.copied { background: #10b981; color: #fff; }

  .stats {
    position: fixed; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,.92);
    backdrop-filter: blur(8px); border-top: 1.5px solid var(--pink-border);
    padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 20px;
    justify-content: center; align-items: center; z-index: 50;
  }
  .stat { text-align: center; }
  .stat .num { font-family: "DM Serif Display", serif; font-size: 22px; color: var(--pink-dark); line-height: 1; }
  .stat .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-top: 3px; }
  .stat.divider { width: 1px; height: 28px; background: var(--pink-border); padding: 0; }
  .pf-legend { display: flex; gap: 12px; font-size: 12px; color: var(--muted); align-items: center; }
  .pf-legend span { display: flex; align-items: center; gap: 5px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .dot.tt { background: var(--tiktok); }
  .dot.ig { background: var(--instagram); }
  .dot.bo { background: var(--both); }

  @media (max-width: 640px) {
    header.page-head h1 { font-size: 28px; }
    .modal { padding: 20px; }
  }
</style>
</head>
<body>
<div class="container">
  <header class="page-head">
    <h1>Case Kisses Content Calendar</h1>
    <p>Plan your week of cute, viral content 🎀</p>
  </header>

  <div class="toolbar">
    <button class="nav-btn" id="prevWeek">← Prev</button>
    <button class="today-btn" id="todayBtn">Today</button>
    <button class="export-btn" id="exportBtn">📤 Export for Posting</button>
    <button class="nav-btn" id="nextWeek">Next →</button>
    <div class="range" id="rangeLabel">—</div>
  </div>

  <div class="chips" id="quickChips"></div>

  <div class="grid-scroll">
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- Add / Edit modal -->
<div class="overlay" id="formOverlay">
  <div class="modal">
    <h2 id="formTitle">Add content</h2>
    <p class="ctx" id="formCtx"></p>
    <form id="contentForm">
      <div class="field">
        <label for="f-platform">Platform</label>
        <select id="f-platform" required></select>
      </div>
      <div class="field">
        <label for="f-product">Product</label>
        <select id="f-product" required></select>
      </div>
      <div class="field">
        <label for="f-archetype">Content type / archetype</label>
        <select id="f-archetype" required></select>
      </div>
      <div class="field">
        <label for="f-caption">Caption / notes</label>
        <textarea id="f-caption" placeholder="Hook, script idea, notes…"></textarea>
      </div>
      <div class="field">
        <label for="f-sound">Sound / hashtags</label>
        <input type="text" id="f-sound" placeholder="e.g. original sound · #casekisses #fyp" />
      </div>
      <div class="field">
        <label>Sound source</label>
        <div class="toggle-row" id="f-soundSource">
          <label data-val="tiktok" class="active">
            <input type="radio" name="soundSource" value="tiktok" checked /> Pick from TikTok 🎵
          </label>
          <label data-val="preloaded">
            <input type="radio" name="soundSource" value="preloaded" /> Already in video ✅
          </label>
        </div>
      </div>
      <div class="field">
        <label>Video file</label>
        <div class="file-row">
          <button type="button" class="file-btn" id="f-videoFileBtn">📁 Choose video…</button>
          <input type="file" id="f-videoFile" accept="video/*" />
          <span class="file-name" id="f-videoFileName">No file selected</span>
        </div>
      </div>
      <div class="field">
        <label for="f-videoprompt">Video prompt (Kling 3.0 / Seedance)</label>
        <textarea id="f-videoprompt" class="vp" placeholder="Shot-by-shot video prompt…"></textarea>
      </div>
      <div class="field">
        <label for="f-status">Status</label>
        <select id="f-status" required></select>
      </div>
      <div class="modal-actions">
        <button type="submit" class="btn-primary">Save</button>
        <button type="button" class="btn-ghost" id="formCancel">Cancel</button>
      </div>
    </form>
  </div>
</div>

<!-- Detail modal -->
<div class="overlay" id="detailOverlay">
  <div class="modal">
    <h2>Content detail</h2>
    <p class="ctx" id="detailCtx"></p>
    <div id="detailBody"></div>
    <div class="vp-label">
      <span>File Name</span>
      <button type="button" class="copy-btn" id="detailCopyFn">Copy Filename</button>
    </div>
    <div class="filename-display" id="detailFn"></div>
    <div class="vp-label">
      <span>Video prompt</span>
      <button type="button" class="copy-btn" id="detailCopyVP">Copy prompt</button>
    </div>
    <pre class="code-box" id="detailVP"></pre>
    <div class="modal-actions" style="flex-wrap: wrap; margin-top: 18px;">
      <button type="button" class="btn-confirm" id="detailConfirm" style="flex:1;">Confirm for Posting ✅</button>
    </div>
    <div class="modal-actions" style="flex-wrap: wrap;">
      <button type="button" class="btn-primary" id="detailPosted">Mark as posted</button>
      <button type="button" class="btn-ghost" id="detailEdit">Edit</button>
      <button type="button" class="btn-danger" id="detailDelete">Delete</button>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn-ghost" id="detailClose" style="flex:1;">Close</button>
    </div>
  </div>
</div>

<div class="stats" id="stats"></div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(function () {
  "use strict";

  var STORAGE_KEY = "ck_calendar";
  var PLATFORMS = ["TikTok", "Instagram", "Both"];
  var PRODUCTS = [
    "Dachshund", "Butter Bear", "Puppy", "Hello Kitty Cherry", "Bow Cherry",
    "Cherry", "Burger", "Mario", "Wavy", "Bow Diamond"
  ];
  var ARCHETYPES = [
    "ASMR Unboxing", "Before/After Ugly Case", "POV Outfit Match", "Girl Math Comedy",
    "Cases I've Been Gatekeeping", "Which One Matches Your Vibe", "Rate My Phone Setup", "Stitch Bait",
    "GRWM Morning Routine", "Satisfying Loop Click", "Small Business BTS", "Fruit Case Trend",
    "My Boyfriend Hates It", "IT Girl Phone Check", "Canadian Small Business", "Compliment Magnet",
    "Nostalgia Hit", "Unboxing Surprise Gift", "Hand Covers Camera Transition", "Outfit Swap Transition",
    "Falling Phone Transition", "PR Package Haul", "Influencer Ranking Haul", "Honest Review 2 Weeks",
    "Not Gatekeeping", "Should Be Illegal Hook", "Founder Story", "Didn't Know This Existed"
  ];
  var STATUSES = [
    { v: "planned",   l: "Planned" },
    { v: "confirmed", l: "Confirmed" },
    { v: "scheduled", l: "Scheduled" },
    { v: "posted",    l: "Posted" }
  ];
  var SLOTS = [
    { id: "7am",  label: "7 AM",  cls: "tint-am",  time24: "07:00" },
    { id: "11am", label: "11 AM", cls: "tint-mid", time24: "11:00" },
    { id: "7pm",  label: "7 PM",  cls: "tint-pm",  time24: "19:00" }
  ];
  function slotTime24(slotId) {
    for (var i = 0; i < SLOTS.length; i++) if (SLOTS[i].id === slotId) return SLOTS[i].time24;
    return "";
  }

  // Auto-generated filename = CK_[case]_c[archetype#]_w[week] (no extension). Computed
  // at render time from the card's current product / archetype / date so it
  // stays in sync if any of those fields are edited later.
  var CASE_SLUGS = {
    "Dachshund": "dachshund",
    "Hello Kitty Cherry": "hellokitty",
    "Mario": "mario",
    "Bow Cherry": "bowcherry",
    "Cherry": "cherry",
    "Wavy": "wavy",
    "Puppy": "puppy",
    "Burger": "burger",
    "Butter Bear": "butterbear",
    "Bow Diamond": "bowdiamond"
  };
  function caseSlug(product) {
    return CASE_SLUGS[product] || String(product || "").toLowerCase().replace(/[^a-z0-9]/g, "");
  }
  function conceptNumber(archetype) {
    for (var i = 0; i < ARCHETYPES.length; i++) if (ARCHETYPES[i] === archetype) return i + 1;
    return 0;
  }
  // w1 = May 27–Jun 2 2026. Each subsequent 7-day block is w2, w3, …
  function weekNumber(dateStr) {
    if (!dateStr) return 0;
    var parts = dateStr.split("-");
    var d = Date.UTC(+parts[0], +parts[1] - 1, +parts[2]);

  function fillStatus(el) {
    el.innerHTML = STATUSES.map(function (s) {
      return '<option value="' + esc(s.v) + '">' + esc(s.l) + "</option>";
    }).join("");
  }

  // ---------- render ----------
  function renderCalendar() {
    document.getElementById("rangeLabel").textContent = rangeLabel(weekStart);
    renderChips();
    renderGrid();
    renderStats();
  }

  function renderChips() {
    var wrap = document.getElementById("quickChips");
    wrap.innerHTML = "";
    ARCHETYPES.forEach(function (t) {
      var b = document.createElement("button");
      b.className = "chip";
      b.type = "button";
      b.textContent = "+ " + t;
      b.addEventListener("click", function () { quickAdd(t); });
      wrap.appendChild(b);
    });
  }

  function renderGrid() {
    var grid = document.getElementById("grid");
    grid.innerHTML = "";
    var todayKey = dateKey(new Date());

    for (var i = 0; i < 7; i++) {
      var d = addDays(weekStart, i);
      var col = document.createElement("div");
      col.className = "day-col";

      var head = document.createElement("div");
      head.className = "day-head" + (dateKey(d) === todayKey ? " is-today" : "");
      head.innerHTML =
        '<div class="dow">' + d.toLocaleDateString("en-US", { weekday: "short" }) + "</div>" +
        '<div class="date">' + d.toLocaleDateString("en-US", { month: "short", day: "numeric" }) + "</div>";
      col.appendChild(head);

      SLOTS.forEach(function (slot) {
        var key = slotKey(d, slot.id);
        var cell = document.createElement("div");
        cell.className = "slot " + slot.cls;
        cell.innerHTML = '<div class="slot-label">' + slot.label + "</div>";

        var entry = data[key];
        if (entry) {
          cell.appendChild(buildCard(key, entry));
        } else {
          var add = document.createElement("button");
          add.className = "add-slot";
          add.type = "button";
          add.textContent = "+ add";
          add.dataset.key = key;
          add.addEventListener("click", function () { openForm(this.dataset.key); });
          cell.appendChild(add);
        }
        col.appendChild(cell);
      });
      grid.appendChild(col);
    }
  }

  function buildCard(key, entry) {
    var card = document.createElement("div");
    var status = entry.status || "planned";
    var stClass = "";
    if (status === "posted") stClass = " is-posted";
    else if (status === "confirmed") stClass = " is-confirmed";
    else if (status === "scheduled") stClass = " is-scheduled";
    card.className = "card pf-" + entry.platform + stClass;
    var filename = generateFilename(entry, key);
    card.innerHTML =
      '<div class="c-type">' + esc(entry.archetype) + "</div>" +
      '<div class="c-product">' + esc(entry.product) + "</div>" +
      '<div class="c-meta">' +
        '<span class="c-status st-' + esc(status) + '">' + esc(statusLabel(status)) + "</span>" +
        (entry.videoFile ? '<span class="c-video" title="' + esc(entry.videoFile) + '">🎬 ' + esc(entry.videoFile) + '</span>' : "") +
        (entry.videoPrompt ? '<span class="c-vp">📝 prompt</span>' : "") +
      "</div>" +
      '<div class="c-filename">' +
        '<span class="fn-text" title="' + esc(filename) + '">' + esc(filename) + "</span>" +
        '<button type="button" class="fn-copy" title="Copy filename" aria-label="Copy filename">📋</button>' +
      "</div>" +
      '<div class="card-actions">' +
        '<button type="button" title="Edit" data-act="edit">✎</button>' +
        '<button type="button" title="Toggle posted" data-act="posted">' + (status === "posted" ? "↺" : "✓") + "</button>" +
        '<button type="button" title="Delete" data-act="del">✕</button>' +
      "</div>";

    card.addEventListener("click", function () { openDetail(key); });
    card.querySelectorAll(".card-actions button").forEach(function (btn) {
      btn.addEventListener("click", function (ev) {
        ev.stopPropagation();
        var act = btn.dataset.act;
        if (act === "edit") openForm(key);
        else if (act === "posted") togglePosted(key);
        else if (act === "del") removeEntry(key);
      });
    });
    var fnBox = card.querySelector(".c-filename");
    var fnCopyBtn = card.querySelector(".fn-copy");
    if (fnCopyBtn) {
      fnCopyBtn.addEventListener("click", function (ev) {
        ev.stopPropagation();
        if (!navigator.clipboard) return;
        navigator.clipboard.writeText(filename).then(function () { flashCopied(fnBox); });
      });
    }
    return card;
  }

  function renderStats() {
    var total = 0, posted = 0, tt = 0, ig = 0, bo = 0;
    for (var i = 0; i < 7; i++) {
      var d = addDays(weekStart, i);
      SLOTS.forEach(function (slot) {
        var e = data[slotKey(d, slot.id)];
        if (!e) return;
        total++;
        if (e.status === "posted") posted++;
        if (e.platform === "TikTok") tt++;
        else if (e.platform === "Instagram") ig++;
        else if (e.platform === "Both") bo++;
      });
    }
    document.getElementById("stats").innerHTML =
      stat(total, "This week") +
      '<div class="stat divider"></div>' +
      stat(posted, "Posted") +
      stat(total - posted, "Remaining") +
      '<div class="stat divider"></div>' +
      '<div class="pf-legend">' +
        '<span><span class="dot tt"></span>TikTok ' + tt + "</span>" +
        '<span><span class="dot ig"></span>Instagram ' + ig + "</span>" +
        '<span><span class="dot bo"></span>Both ' + bo + "</span>" +
      "</div>";
  }
  function stat(num, lbl) {
    return '<div class="stat"><div class="num">' + num + '</div><div class="lbl">' + lbl + "</div></div>";
  }

  // ---------- actions ----------
  function quickAdd(archetype) {
    for (var i = 0; i < 7; i++) {
      var d = addDays(weekStart, i);
      for (var s = 0; s < SLOTS.length; s++) {
        var key = slotKey(d, SLOTS[s].id);
        if (!data[key]) { openForm(key, archetype); return; }
      }
    }
    alert("No empty slots left this week — try next week 🎀");
  }

  // pending video filename for the form being edited — file inputs can't
  // be programmatically re-populated, so we track the chosen filename here.
  var pendingVideoFile = "";

  function setSoundSourceUI(val) {
    var labels = document.querySelectorAll("#f-soundSource label");
    labels.forEach(function (lab) {
      var active = lab.getAttribute("data-val") === val;
      lab.classList.toggle("active", active);
      var input = lab.querySelector("input");
      if (input) input.checked = active;
    });
  }
  function getSoundSourceUI() {
    var checked = document.querySelector('#f-soundSource input[name="soundSource"]:checked');
    return checked ? checked.value : "tiktok";
  }
  function setVideoFileUI(name) {
    pendingVideoFile = name || "";
    document.getElementById("f-videoFileName").textContent = pendingVideoFile || "No file selected";
  }

  function openForm(key, presetArchetype) {
    formKey = key;
    var e = data[key];
    document.getElementById("formTitle").textContent = e ? "Edit content" : "Add content";
    document.getElementById("formCtx").textContent = humanContext(key);
    document.getElementById("f-platform").value = e ? e.platform : PLATFORMS[0];
    document.getElementById("f-product").value = e ? e.product : PRODUCTS[0];
    document.getElementById("f-archetype").value = e ? e.archetype : (presetArchetype || ARCHETYPES[0]);
    document.getElementById("f-caption").value = e ? (e.caption || "") : "";
    document.getElementById("f-sound").value = e ? (e.sound || "") : "";
    document.getElementById("f-videoprompt").value = e ? (e.videoPrompt || "") : "";
    document.getElementById("f-status").value = e ? (e.status || "planned") : STATUSES[0].v;
    setSoundSourceUI(e && e.soundSource ? e.soundSource : "tiktok");
    setVideoFileUI(e && e.videoFile ? e.videoFile : "");
    // Reset native file input value so picking the same file twice still fires change.
    document.getElementById("f-videoFile").value = "";
    closeOverlay("detailOverlay");
    openOverlay("formOverlay");
  }

  // Sound-source toggle clicks (whole label area is the target).
  document.querySelectorAll("#f-soundSource label").forEach(function (lab) {
    lab.addEventListener("click", function () { setSoundSourceUI(lab.getAttribute("data-val")); });
  });

  // Video file: open the hidden file input when the button is clicked,
  // store only the basename — full paths aren't exposed by the browser anyway.
  document.getElementById("f-videoFileBtn").addEventListener("click", function () {
    document.getElementById("f-videoFile").click();
  });
  document.getElementById("f-videoFile").addEventListener("change", function (ev) {
    var f = ev.target.files && ev.target.files[0];
    if (f) setVideoFileUI(f.name);
  });

  document.getElementById("contentForm").addEventListener("submit", function (ev) {
    ev.preventDefault();
    if (!formKey) return;
    var existing = data[formKey];
    data[formKey] = {
      id: existing && existing.id ? existing.id : "c_" + Math.random().toString(36).slice(2, 10),
      platform: document.getElementById("f-platform").value,
      product: document.getElementById("f-product").value,
      archetype: document.getElementById("f-archetype").value,
      caption: document.getElementById("f-caption").value.trim(),
      sound: document.getElementById("f-sound").value.trim(),
      soundSource: getSoundSourceUI(),
      videoFile: pendingVideoFile,
      videoPrompt: document.getElementById("f-videoprompt").value.trim(),
      status: document.getElementById("f-status").value,
      createdAt: existing && existing.createdAt ? existing.createdAt : Date.now()
    };
    saveData();
    closeOverlay("formOverlay");
    renderCalendar();
  });

  function soundSourceLabel(v) {
    if (v === "preloaded") return "Already in video ✅";
    return "Pick from TikTok 🎵";
  }
  function openDetail(key) {
    var e = data[key];
    if (!e) return;
    detailKey = key;
    document.getElementById("detailCtx").textContent = humanContext(key);
    document.getElementById("detailBody").innerHTML =
      row("Platform", e.platform) +
      row("Product", e.product) +
      row("Archetype", e.archetype) +
      row("Caption", e.caption || "—") +
      row("Sound / tags", e.sound || "—") +
      row("Sound source", soundSourceLabel(e.soundSource || "tiktok")) +
      row("Video file", e.videoFile || "—") +
      row("Status", statusLabel(e.status));
    document.getElementById("detailFn").textContent = generateFilename(e, key);
    document.getElementById("detailVP").textContent = e.videoPrompt || "No video prompt yet.";
    document.getElementById("detailPosted").textContent =
      e.status === "posted" ? "Mark as planned" : "Mark as posted";
    // The Confirm button is hidden once a card is already confirmed/scheduled/posted.
    var canConfirm = !e.status || e.status === "planned";
    document.getElementById("detailConfirm").style.display = canConfirm ? "" : "none";
    closeOverlay("formOverlay");
    openOverlay("detailOverlay");
  }
  function row(k, v) {
    return '<div class="detail-row"><div class="k">' + esc(k) + '</div><div class="v">' + esc(v) + "</div></div>";
  }

  document.getElementById("detailCopyVP").addEventListener("click", function () {
    var btn = this;
    var text = document.getElementById("detailVP").textContent;
    if (!text) return;
    navigator.clipboard.writeText(text).then(function () {
      btn.classList.add("copied");
      btn.textContent = "✓ Copied!";
      setTimeout(function () { btn.classList.remove("copied"); btn.textContent = "Copy prompt"; }, 2000);
    });
  });

  document.getElementById("detailCopyFn").addEventListener("click", function () {
    var btn = this;
    var text = document.getElementById("detailFn").textContent;
    if (!text || !navigator.clipboard) return;
    navigator.clipboard.writeText(text).then(function () {
      btn.classList.add("copied");
      btn.textContent = "✓ Copied!";
      setTimeout(function () { btn.classList.remove("copied"); btn.textContent = "Copy Filename"; }, 1000);
    });
  });

  function togglePosted(key) {
    var e = data[key];
    if (!e) return;
    e.status = e.status === "posted" ? "planned" : "posted";
    saveData();
    renderCalendar();
    if (detailKey === key && document.getElementById("detailOverlay").classList.contains("open")) {
      openDetail(key);
    }
  }
  function confirmEntry(key) {
    var e = data[key];
    if (!e) return;
    e.status = "confirmed";
    saveData();
    renderCalendar();
    showToast("Confirmed for posting ✅");
    if (detailKey === key && document.getElementById("detailOverlay").classList.contains("open")) {
      openDetail(key);
    }
  }
  function removeEntry(key) {
    if (!data[key]) return;
    if (!confirm("Delete this content card?")) return;
    delete data[key];
    saveData();
    closeOverlay("detailOverlay");
    renderCalendar();
  }

  // ---------- toast ----------
  var toastTimer = null;
  function showToast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.classList.remove("show"); }, 3200);
  }

  // ---------- export ----------
  // Walks the live `data` map (which is the full localStorage payload — all weeks,
  // not just the visible one) and emits the JSON contract the Python poster expects.
  function exportForPosting() {
    var queue = [];
    Object.keys(data).forEach(function (key) {
      var e = data[key];
      if (!e || e.status !== "confirmed") return;
      var parts = key.split("__");
      var dateKey = parts[0];
      var timeKey = parts[1];
      queue.push({
        id: e.id,
        dateKey: dateKey,
        timeKey: timeKey,
        platform: e.platform,
        product: e.product,
        archetype: e.archetype,
        caption: e.caption || "",
        sound: e.sound || "",
        soundSource: e.soundSource || "tiktok",
        videoFile: e.videoFile || "",
        scheduleDate: dateKey,
        scheduleTime: slotTime24(timeKey),
        status: e.status
      });
    });
    queue.sort(function (a, b) {
      if (a.scheduleDate !== b.scheduleDate) return a.scheduleDate < b.scheduleDate ? -1 : 1;
      return a.scheduleTime < b.scheduleTime ? -1 : 1;
    });

    var blob = new Blob([JSON.stringify(queue, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "posting-queue.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);

    showToast("Exported " + queue.length + " posts ready for scheduling 🎀");
  }

  // ---------- overlays ----------
  function openOverlay(id) { document.getElementById(id).classList.add("open"); }
  function closeOverlay(id) { document.getElementById(id).classList.remove("open"); }
  function closeAllOverlays() { closeOverlay("formOverlay"); closeOverlay("detailOverlay"); }

  document.getElementById("formCancel").addEventListener("click", function () { closeOverlay("formOverlay"); });
  document.getElementById("detailClose").addEventListener("click", function () { closeOverlay("detailOverlay"); });
  document.getElementById("detailEdit").addEventListener("click", function () { if (detailKey) openForm(detailKey); });
  document.getElementById("detailDelete").addEventListener("click", function () { if (detailKey) removeEntry(detailKey); });
  document.getElementById("detailPosted").addEventListener("click", function () { if (detailKey) togglePosted(detailKey); });
  document.getElementById("detailConfirm").addEventListener("click", function () { if (detailKey) confirmEntry(detailKey); });
  document.getElementById("exportBtn").addEventListener("click", exportForPosting);

  ["formOverlay", "detailOverlay"].forEach(function (id) {
    document.getElementById(id).addEventListener("click", function (ev) {
      if (ev.target === this) closeOverlay(id);
    });
  });
  document.addEventListener("keydown", function (ev) {
    if (ev.key === "Escape") closeAllOverlays();
  });

  // ---------- nav ----------
  document.getElementById("prevWeek").addEventListener("click", function () { weekStart = addDays(weekStart, -7); renderCalendar(); });
  document.getElementById("nextWeek").addEventListener("click", function () { weekStart = addDays(weekStart, 7); renderCalendar(); });
  document.getElementById("todayBtn").addEventListener("click", function () { weekStart = startOfWeek(new Date()); renderCalendar(); });

  // ---------- init ----------
  fillSelect(document.getElementById("f-platform"), PLATFORMS);
  fillSelect(document.getElementById("f-product"), PRODUCTS);
  fillSelect(document.getElementById("f-archetype"), ARCHETYPES);
  fillStatus(document.getElementById("f-status"));

  seedPlan();
  data = loadData();
  renderCalendar();
})();
</script>
</body>
</html>
