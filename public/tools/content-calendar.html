<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Case Kisses Content Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=DM+Serif+Display&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --pink: #ec4899;
    --pink-dark: #be123c;
    --pink-soft: #fce7f3;
    --pink-border: #fbcfe8;
    --ink: #3f3f46;
    --muted: #71717a;
    --tiktok: #111827;
    --instagram: #ec4899;
    --both: #a855f7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "DM Sans", -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #fde7f3 0%, #fef3f9 45%, #fdf6e9 100%);
    min-height: 100vh;
    color: var(--ink);
    padding: 24px 16px 96px;
  }
  h1, h2, h3 { font-family: "DM Serif Display", Georgia, serif; font-weight: 400; }

  .container { max-width: 1240px; margin: 0 auto; }

  header.page-head { text-align: center; margin-bottom: 22px; }
  header.page-head h1 { font-size: 36px; color: var(--pink-dark); }
  header.page-head p { color: var(--muted); font-size: 14px; margin-top: 4px; }

  .toolbar {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .toolbar .range {
    font-family: "DM Serif Display", serif;
    font-size: 20px; color: var(--pink-dark); min-width: 240px; text-align: center;
  }
  button {
    font-family: inherit; cursor: pointer; border: none;
    border-radius: 999px; transition: all .15s ease;
  }
  .nav-btn {
    background: #fff; color: var(--pink-dark);
    border: 1.5px solid var(--pink-border);
    padding: 9px 16px; font-size: 14px; font-weight: 500;
  }
  .nav-btn:hover { background: var(--pink-soft); }
  .today-btn {
    background: linear-gradient(135deg, var(--pink) 0%, #f43f5e 100%);
    color: #fff; padding: 9px 18px; font-size: 14px; font-weight: 700;
  }
  .today-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(236,72,153,.3); }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 22px; }
  .chip {
    background: #fff; border: 1.5px solid var(--pink-border);
    color: var(--pink-dark); padding: 7px 14px; font-size: 12px; font-weight: 600;
  }
  .chip:hover { background: var(--pink); color: #fff; border-color: var(--pink); }

  .grid-scroll { overflow-x: auto; padding-bottom: 8px; }
  .grid {
    display: grid; grid-template-columns: repeat(7, minmax(150px, 1fr));
    gap: 10px; min-width: 980px;
  }
  .day-col { display: flex; flex-direction: column; gap: 8px; }
  .day-head {
    text-align: center; padding: 8px 4px; border-radius: 12px;
    background: #fff; border: 1.5px solid var(--pink-border);
  }
  .day-head .dow { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .day-head .date { font-family: "DM Serif Display", serif; font-size: 17px; color: var(--ink); }
  .day-head.is-today { background: var(--pink); border-color: var(--pink); }
  .day-head.is-today .dow, .day-head.is-today .date { color: #fff; }

  .slot {
    border-radius: 12px; padding: 8px; min-height: 96px;
    border: 1.5px solid transparent; display: flex; flex-direction: column;
  }
  .slot .slot-label { font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; opacity: .7; margin-bottom: 6px; }
  .tint-am  { background: #fef9c3; border-color: #fde68a; }
  .tint-mid { background: #fce7f3; border-color: #fbcfe8; }
  .tint-pm  { background: #ede9fe; border-color: #ddd6fe; }

  .add-slot {
    flex: 1; width: 100%; background: transparent;
    border: 2px dashed rgba(0,0,0,.15); border-radius: 10px;
    color: var(--muted); font-size: 13px; font-weight: 600; min-height: 60px;
  }
  .add-slot:hover { border-color: var(--pink); color: var(--pink); background: rgba(255,255,255,.5); }

  .card {
    position: relative; background: #fff; border-radius: 10px;
    padding: 10px 10px 10px 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06);
    cursor: pointer; overflow: hidden;
  }
  .card::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
  }
  .card.pf-TikTok::before    { background: var(--tiktok); }
  .card.pf-Instagram::before { background: var(--instagram); }
  .card.pf-Both::before      { background: var(--both); }
  .card .c-type { font-size: 13px; font-weight: 700; color: var(--ink); line-height: 1.25; }
  .card .c-product { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .card .c-meta { display: flex; align-items: center; gap: 6px; margin-top: 7px; flex-wrap: wrap; }
  .card .c-status {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 999px;
  }
  .card .c-status.st-planned   { background: #e4e4e7; color: #3f3f46; }
  .card .c-status.st-confirmed { background: #d1fae5; color: #047857; }
  .card .c-status.st-scheduled { background: #dbeafe; color: #1d4ed8; }
  .card .c-status.st-posted    { background: #111827; color: #f9fafb; }
  .card .c-vp {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 999px; background: #1e1b2e; color: #f5d5e6;
  }
  .card .c-video {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 999px; background: #d1fae5; color: #047857;
    max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card .c-concept {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 999px; background: var(--pink-soft); color: var(--pink-dark);
  }
  .card .c-preset {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 999px; background: #dbeafe; color: #1d4ed8;
  }
  .card.is-confirmed { border: 1.5px solid #10b981; box-shadow: 0 2px 8px rgba(16,185,129,.18); }
  .card.is-scheduled { border: 1.5px solid #3b82f6; box-shadow: 0 2px 8px rgba(59,130,246,.18); }
  .card.is-posted .c-type,
  .card.is-posted .c-product { text-decoration: line-through; color: #111827; }
  .card.is-posted { opacity: .55; }

  /* Sound source toggle (radio-style buttons) */
  .toggle-row { display: flex; gap: 8px; }
  .toggle-row label {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 10px 12px; font-size: 13px; font-weight: 600; cursor: pointer;
    border: 1.5px solid var(--pink-border); border-radius: 10px;
    background: #fff; color: var(--muted); transition: all .15s ease;
    margin-bottom: 0;
  }
  .toggle-row label.active { background: var(--pink-soft); border-color: var(--pink); color: var(--pink-dark); }
  .toggle-row input { display: none; }

  /* File input — styled "browse" button */
  .file-row { display: flex; align-items: center; gap: 8px; }
  .file-row .file-btn {
    background: #fff; color: var(--pink-dark); border: 1.5px solid var(--pink-border);
    padding: 9px 14px; font-size: 13px; font-weight: 600; border-radius: 10px;
    cursor: pointer; white-space: nowrap;
  }
  .file-row .file-btn:hover { background: var(--pink-soft); }
  .file-row .file-name { font-size: 12.5px; color: var(--muted); flex: 1; word-break: break-all; }
  .file-row input[type="file"] { display: none; }

  /* Export button + toast */
  .export-btn {
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    color: #fff; padding: 9px 16px; font-size: 14px; font-weight: 700;
  }
  .export-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(16,185,129,.3); }
  .match-btn {
    background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
    color: #fff; padding: 9px 16px; font-size: 14px; font-weight: 700;
  }
  .match-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(59,130,246,.3); }
  .round-btn {
    background: linear-gradient(135deg, #f43f5e 0%, #be123c 100%);
    color: #fff; padding: 9px 16px; font-size: 14px; font-weight: 700;
  }
  .round-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(244,63,94,.3); }
  .sync-btn {
    background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
    color: #fff; padding: 9px 16px; font-size: 14px; font-weight: 700;
  }
  .sync-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(99,102,241,.3); }
  .toast {
    position: fixed; left: 50%; bottom: 96px; transform: translateX(-50%) translateY(20px);
    background: #111827; color: #fff; padding: 12px 20px; border-radius: 999px;
    font-size: 14px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,.25);
    opacity: 0; pointer-events: none; transition: opacity .25s ease, transform .25s ease;
    z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }

  .card-actions {
    position: absolute; top: 6px; right: 6px; display: flex; gap: 4px;
    opacity: 0; transition: opacity .15s ease;
  }
  .card:hover .card-actions { opacity: 1; }
  .card-actions button {
    width: 24px; height: 24px; border-radius: 6px; font-size: 12px;
    background: #fff; border: 1px solid var(--pink-border); color: var(--pink-dark);
    display: flex; align-items: center; justify-content: center; line-height: 1; padding: 0;
  }
  .card-actions button:hover { background: var(--pink); color: #fff; border-color: var(--pink); }
  .card-actions button.act-confirm.is-on {
    background: #10b981; color: #fff; border-color: #10b981;
  }
  .card-actions button.act-confirm.is-on:hover {
    background: #059669; border-color: #059669;
  }
  .card-actions button.act-confirm.is-locked {
    opacity: .4; cursor: not-allowed;
  }
  .card-actions button.act-confirm.is-locked:hover {
    background: #fff; color: var(--pink-dark); border-color: var(--pink-border);
  }

  .overlay {
    position: fixed; inset: 0; background: rgba(40,10,30,.55);
    display: none; align-items: center; justify-content: center; padding: 20px; z-index: 100;
  }
  .overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 20px; width: 100%; max-width: 480px;
    max-height: 90vh; overflow-y: auto; padding: 26px; box-shadow: 0 20px 60px rgba(0,0,0,.25);
  }
  .modal h2 { font-size: 22px; color: var(--pink-dark); margin-bottom: 2px; }
  .modal .ctx { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 700; color: var(--pink-dark); margin-bottom: 6px; }
  .field select, .field input, .field textarea {
    width: 100%; padding: 10px 12px; font-family: inherit; font-size: 14px;
    border: 1.5px solid var(--pink-border); border-radius: 10px; background: #fff; color: var(--ink);
  }
  .field select:focus, .field input:focus, .field textarea:focus {
    outline: none; border-color: var(--pink); box-shadow: 0 0 0 3px rgba(236,72,153,.12);
  }
  .field textarea { resize: vertical; min-height: 70px; }
  .field textarea.vp { min-height: 110px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12.5px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
  .btn-primary {
    flex: 1; background: linear-gradient(135deg, var(--pink) 0%, #f43f5e 100%);
    color: #fff; padding: 12px; font-size: 15px; font-weight: 700;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(236,72,153,.3); }
  .btn-ghost { background: #f4f4f5; color: var(--ink); padding: 12px 18px; font-size: 15px; font-weight: 600; }
  .btn-ghost:hover { background: #e4e4e7; }
  .btn-danger { background: #fee2e2; color: #b91c1c; padding: 12px 18px; font-size: 15px; font-weight: 600; }
  .btn-danger:hover { background: #fecaca; }

  .detail-row { display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f4f4f5; font-size: 14px; }
  .detail-row .k { font-weight: 700; color: var(--pink-dark); min-width: 92px; }
  .detail-row .v { color: var(--ink); white-space: pre-wrap; word-break: break-word; flex: 1; }

  .vp-label {
    font-size: 12px; font-weight: 700; color: var(--pink-dark);
    margin: 16px 0 6px; display: flex; align-items: center; justify-content: space-between;
  }
  .code-box {
    background: #1e1b2e; color: #f5d5e6;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12.5px; line-height: 1.55; padding: 14px; border-radius: 10px;
    white-space: pre-wrap; word-break: break-word; max-height: 260px; overflow-y: auto;
    border: 1px solid #3b2f4a; margin: 0;
  }
  .copy-btn {
    background: #fbbf24; color: #78350f; padding: 6px 12px; font-size: 12px;
    font-weight: 700; border-radius: 6px;
  }
  .copy-btn:hover { background: #f59e0b; }
  .copy-btn.copied { background: #10b981; color: #fff; }

  .stats {
    position: fixed; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,.92);
    backdrop-filter: blur(8px); border-top: 1.5px solid var(--pink-border);
    padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 20px;
    justify-content: center; align-items: center; z-index: 50;
  }
  .stat { text-align: center; }
  .stat .num { font-family: "DM Serif Display", serif; font-size: 22px; color: var(--pink-dark); line-height: 1; }
  .stat .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-top: 3px; }
  .stat.divider { width: 1px; height: 28px; background: var(--pink-border); padding: 0; }
  .pf-legend { display: flex; gap: 12px; font-size: 12px; color: var(--muted); align-items: center; }
  .pf-legend span { display: flex; align-items: center; gap: 5px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .dot.tt { background: var(--tiktok); }
  .dot.ig { background: var(--instagram); }
  .dot.bo { background: var(--both); }

  /* Video shoot list — derived from every card's case + archetype combo.
     Sits in normal flow below the calendar; body's 96px bottom padding keeps
     the last group visible above the fixed stats bar. */
  .shoot-list {
    background: #fff; border: 1.5px solid var(--pink-border);
    border-radius: 18px; margin: 28px 0 24px;
    overflow: hidden;
  }
  .shoot-list .sl-head {
    background: var(--pink-soft); padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
    border-bottom: 1.5px solid var(--pink-border);
  }
  .shoot-list .sl-head h2 { font-size: 22px; color: var(--pink-dark); }
  .shoot-list .sl-count {
    padding: 12px 18px 0; color: var(--muted); font-size: 13px; font-weight: 600;
  }
  .shoot-list .sl-body { padding: 8px 18px 18px; }
  .shoot-list .sl-empty {
    color: var(--muted); font-style: italic; padding: 12px 0; font-size: 14px;
  }
  .shoot-list .sl-group { margin-top: 16px; }
  .shoot-list .sl-group:first-child { margin-top: 6px; }
  .shoot-list .sl-group-head {
    font-family: "DM Serif Display", serif; font-size: 16px;
    color: var(--pink-dark); letter-spacing: .04em;
    border-bottom: 1px solid var(--pink-border);
    padding-bottom: 4px; margin-bottom: 6px;
  }
  .shoot-list .sl-list { list-style: none; padding: 0; margin: 0; }
  .shoot-list .sl-item {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 0; border-bottom: 1px dashed #f4f4f5;
  }
  .shoot-list .sl-item:last-child { border-bottom: none; }
  .shoot-list .sl-name {
    flex: 1; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 13px; color: var(--ink); word-break: break-all;
  }
  .shoot-list .sl-copy {
    width: 28px; height: 28px; padding: 0; flex-shrink: 0;
    border: 1px solid #d4d4d8; background: #fff; color: #52525b;
    border-radius: 6px; font-size: 12px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .shoot-list .sl-copy:hover { background: #e4e4e7; }
  .shoot-list .sl-copy.copied { background: #10b981; color: #fff; border-color: #10b981; }

  @media (max-width: 640px) {
    header.page-head h1 { font-size: 28px; }
    .modal { padding: 20px; }
  }
</style>
</head>
<body>
<div class="container">
  <header class="page-head">
    <h1>Case Kisses Content Calendar</h1>
    <p>Plan your week of cute, viral content 🎀</p>
  </header>

  <div class="toolbar">
    <button class="nav-btn" id="prevWeek">← Prev</button>
    <button class="today-btn" id="todayBtn">Today</button>
    <button class="export-btn" id="exportBtn">📤 Export for Posting</button>
    <button class="match-btn" id="autoMatchBtn">🎬 Auto-Match Videos</button>
    <button class="round-btn" id="startPostingBtn">🚀 Start Posting Round</button>
    <button class="sync-btn" id="syncPostedBtn">📥 Sync Posted Status</button>
    <input type="file" id="autoMatchInput" accept="video/mp4,.mp4" multiple style="display:none">
    <input type="file" id="startPostingInput" accept="video/mp4,.mp4" multiple style="display:none">
    <input type="file" id="syncPostedInput" accept=".json,application/json" style="display:none">
    <button class="nav-btn" id="nextWeek">Next →</button>
    <div class="range" id="rangeLabel">—</div>
  </div>

  <div class="chips" id="quickChips"></div>

  <div class="grid-scroll">
    <div class="grid" id="grid"></div>
  </div>

  <section class="shoot-list" id="shootList">
    <div class="sl-head">
      <h2>🎬 Video Shoot List</h2>
      <button type="button" class="copy-btn" id="shootListCopyAll">Copy All</button>
    </div>
    <p class="sl-count" id="shootListCount">—</p>
    <div class="sl-body" id="shootListBody"></div>
  </section>
</div>

<!-- Add / Edit modal -->
<div class="overlay" id="formOverlay">
  <div class="modal">
    <h2 id="formTitle">Add content</h2>
    <p class="ctx" id="formCtx"></p>
    <form id="contentForm">
      <div class="field">
        <label for="f-date">Post date</label>
        <input type="date" id="f-date" required />
      </div>
      <div class="field">
        <label for="f-slot">Post time</label>
        <select id="f-slot" required>
          <option value="7am">7 AM</option>
          <option value="11am">11 AM</option>
          <option value="7pm">7 PM</option>
        </select>
      </div>
      <div class="field">
        <label for="f-platform">Platform</label>
        <select id="f-platform" required></select>
      </div>
      <div class="field">
        <label for="f-product">Product</label>
        <select id="f-product" required></select>
      </div>
      <div class="field">
        <label for="f-archetype">Content type / archetype</label>
        <select id="f-archetype" required></select>
      </div>
      <div class="field">
        <label for="f-caption">Caption / notes</label>
        <textarea id="f-caption" placeholder="Hook, script idea, notes…"></textarea>
      </div>
      <div class="field">
        <label for="f-sound">Sound / hashtags</label>
        <input type="text" id="f-sound" placeholder="e.g. original sound · #casekisses #fyp" />
      </div>
      <div class="field">
        <label>Sound source</label>
        <div class="toggle-row" id="f-soundSource">
          <label data-val="tiktok" class="active">
            <input type="radio" name="soundSource" value="tiktok" checked /> Pick from TikTok 🎵
          </label>
          <label data-val="preloaded">
            <input type="radio" name="soundSource" value="preloaded" /> Already in video ✅
          </label>
        </div>
      </div>
      <div class="field">
        <label>Video file</label>
        <div class="file-row">
          <button type="button" class="file-btn" id="f-videoFileBtn">📁 Choose video…</button>
          <input type="file" id="f-videoFile" accept="video/*" />
          <span class="file-name" id="f-videoFileName">No file selected</span>
        </div>
      </div>
      <div class="field">
        <label for="f-videoprompt">Video prompt (Kling 3.0 / Seedance)</label>
        <textarea id="f-videoprompt" class="vp" placeholder="Shot-by-shot video prompt…"></textarea>
      </div>
      <div class="field">
        <label for="f-status">Status</label>
        <select id="f-status" required></select>
      </div>
      <div class="modal-actions">
        <button type="submit" class="btn-primary">Save</button>
        <button type="button" class="btn-ghost" id="formCancel">Cancel</button>
      </div>
    </form>
  </div>
</div>

<!-- Detail modal -->
<div class="overlay" id="detailOverlay">
  <div class="modal">
    <h2>Content detail</h2>
    <p class="ctx" id="detailCtx"></p>
    <div id="detailBody"></div>
    <div class="vp-label">
      <span>Video prompt</span>
      <button type="button" class="copy-btn" id="detailCopyVP">Copy prompt</button>
    </div>
    <pre class="code-box" id="detailVP"></pre>
    <div class="modal-actions" style="flex-wrap: wrap; margin-top: 18px;">
      <button type="button" class="btn-primary" id="detailPosted">Mark as posted</button>

  // ---------- seed ----------
  // Versioned gate: runs once per version. v12 renames `videoFile` to
  // `videoFilePath` on every existing entry — the slot ID is now the identifier
  // the user types as their Higgsfield export filename, while videoFilePath
  // points at whatever local file they attach (multiple slots may reuse the
  // same file). For existing slots, also syncs archetype + preset and
  // back-fills an empty videoPrompt with the default template prompt —
  // user-written prompts are never overwritten. Empty slots get a full SEED
  // insert with preset + rendered videoPrompt.
  function seedPlan() {
    var seeded;
    try { seeded = localStorage.getItem("ck_calendar_seeded_v14"); } catch (e) { return; }
    if (seeded != null) return;

    var existing = {};
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      var parsed = raw ? JSON.parse(raw) : {};
      if (parsed && typeof parsed === "object") existing = parsed;
    } catch (e) { /* ignore */ }

    // v12 migration: rename legacy videoFile → videoFilePath. The old field
    // stored only the basename, so existing values are carried over verbatim.
    Object.keys(existing).forEach(function (k) {
      var cur = existing[k];
      if (!cur || typeof cur !== "object") return;
      if (cur.videoFilePath == null && cur.videoFile) {
        cur.videoFilePath = cur.videoFile;
      }
      delete cur.videoFile;
    });

    SEED.forEach(function (s) {
      var key = s.date + "__" + s.slot;
      var preset = presetFor(s.archetype);
      var prompt = defaultPromptFor(s.archetype, s.product);
      var cur = existing[key];
      if (cur) {
        cur.archetype = s.archetype;
        cur.preset = preset;
        if (!cur.videoPrompt) cur.videoPrompt = prompt;
      } else {
        existing[key] = {
          id: "c_" + Math.random().toString(36).slice(2, 10),
          platform: s.platform,
          product: s.product,
          archetype: s.archetype,
          preset: preset,
          caption: s.caption,
          sound: s.sound,
          videoPrompt: prompt,
          status: "planned",
          createdAt: Date.now()
        };
      }
    });
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(existing)); } catch (e) { /* ignore */ }
    try { localStorage.setItem("ck_calendar_seeded_v14", "1"); } catch (e) { /* ignore */ }
  }

      return {};
    }
  }

  // ---------- dates ----------
  function addDays(d, n) { return new Date(d.getFullYear(), d.getMonth(), d.getDate() + n); }
  function startOfWeek(d) {
    var day = d.getDay();
    var offset = (day + 6) % 7; // days since Monday
    return addDays(new Date(d.getFullYear(), d.getMonth(), d.getDate()), -offset);
  }
  function pad(n) { return n < 10 ? "0" + n : "" + n; }
  function dateKey(d) { return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()); }
  function slotKey(d, slotId) { return dateKey(d) + "__" + slotId; }
  function parseKey(key) {
    var parts = key.split("__");
    var dp = parts[0].split("-");
    return {
      date: new Date(parseInt(dp[0], 10), parseInt(dp[1], 10) - 1, parseInt(dp[2], 10)),
      slotId: parts[1]
    };
  }
  function rangeLabel(start) {
    var end = addDays(start, 6);
    var o = { month: "short", day: "numeric" };
    return start.toLocaleDateString("en-US", o) + " – " +
           end.toLocaleDateString("en-US", o) + ", " + end.getFullYear();
  }
  function humanContext(key) {
    var p = parseKey(key);
    var slot = SLOTS.filter(function (s) { return s.id === p.slotId; })[0];
    return p.date.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" }) +
           " · " + (slot ? slot.label : p.slotId);
  }

  // ---------- helpers ----------
  function esc(str) {
    return String(str == null ? "" : str)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }
  function statusLabel(v) {
    for (var i = 0; i < STATUSES.length; i++) if (STATUSES[i].v === v) return STATUSES[i].l;
    return v;
  }
  function fillSelect(el, options) {
    el.innerHTML = options.map(function (o) {
      return '<option value="' + esc(o) + '">' + esc(o) + "</option>";
    }).join("");
  }
  function fillStatus(el) {
    el.innerHTML = STATUSES.map(function (s) {
      return '<option value="' + esc(s.v) + '">' + esc(s.l) + "</option>";
    }).join("");
  }

  function renderGrid() {
    var grid = document.getElementById("grid");
    grid.innerHTML = "";
    var todayKey = dateKey(new Date());

    for (var i = 0; i < 7; i++) {
      var d = addDays(weekStart, i);
      var col = document.createElement("div");
      col.className = "day-col";

      var head = document.createElement("div");
      head.className = "day-head" + (dateKey(d) === todayKey ? " is-today" : "");
      head.innerHTML =
        '<div class="dow">' + d.toLocaleDateString("en-US", { weekday: "short" }) + "</div>" +
        '<div class="date">' + d.toLocaleDateString("en-US", { month: "short", day: "numeric" }) + "</div>";
      col.appendChild(head);

      SLOTS.forEach(function (slot) {
        var key = slotKey(d, slot.id);
        var cell = document.createElement("div");
        cell.className = "slot " + slot.cls;
        cell.innerHTML = '<div class="slot-label">' + slot.label + "</div>";

        var entry = data[key];
        if (entry) {
          cell.appendChild(buildCard(key, entry));
        } else {
          var add = document.createElement("button");
          add.className = "add-slot";
          add.type = "button";
          add.textContent = "+ add";
          add.dataset.key = key;
          add.addEventListener("click", function () { openForm(this.dataset.key); });
          cell.appendChild(add);
        }
        col.appendChild(cell);
      });
      grid.appendChild(col);
    }
  }

  function buildCard(key, entry) {
    var card = document.createElement("div");
    var status = entry.status || "planned";
    var stClass = "";
    if (status === "posted") stClass = " is-posted";
    else if (status === "confirmed") stClass = " is-confirmed";
    else if (status === "scheduled") stClass = " is-scheduled";
    card.className = "card pf-" + entry.platform + stClass;
    var videoPath = entry.videoFilePath || "";
    var videoLabel = videoPath ? videoPath.split(/[\\/]/).pop() : "";
    var conceptNum = conceptNumber(entry.archetype);
    var preset = entry.preset || presetFor(entry.archetype);
    card.innerHTML =
      '<div class="c-type">' + esc(entry.archetype) + "</div>" +
      '<div class="c-product">' + esc(entry.product) + "</div>" +
      '<div class="c-meta">' +
        '<span class="c-status st-' + esc(status) + '">' + esc(statusLabel(status)) + "</span>" +
        (conceptNum ? '<span class="c-concept">C' + conceptNum + "</span>" : "") +
        (preset ? '<span class="c-preset">' + esc(preset) + "</span>" : "") +
        (videoLabel ? '<span class="c-video" title="' + esc(videoPath) + '">🎬 ' + esc(videoLabel) + '</span>' : "") +
        (entry.videoPrompt ? '<span class="c-vp">📝 prompt</span>' : "") +
      "</div>" +
      '<div class="card-actions">' +
        '<button type="button" title="Edit" data-act="edit">✎</button>' +
        confirmBtnHTML(status) +
        '<button type="button" title="Delete" data-act="del">✕</button>' +
      "</div>";

    card.addEventListener("click", function () { openDetail(key); });
    card.querySelectorAll(".card-actions button").forEach(function (btn) {
      btn.addEventListener("click", function (ev) {
        ev.stopPropagation();
        var act = btn.dataset.act;
        if (act === "edit") openForm(key);
        else if (act === "confirm") toggleConfirm(key);
        else if (act === "del") removeEntry(key);
      });
    });
    return card;
  }

  function confirmBtnHTML(status) {
    var locked = status === "scheduled" || status === "posted";
    var on = status === "confirmed";
    var cls = "act-confirm" + (on ? " is-on" : "") + (locked ? " is-locked" : "");
    var title = locked
      ? "Already " + status
      : (on ? "Unconfirm (back to planned)" : "Confirm for posting");
    return '<button type="button" class="' + cls + '" title="' + title + '" data-act="confirm">✓</button>';
  }

  function renderStats() {
    // Totals are calendar-wide (across all weeks) because posting rounds
    // also operate across all weeks, not just the visible one.
    var planned = 0, confirmed = 0, posted = 0;
    var tt = 0, ig = 0, bo = 0;
    Object.keys(data).forEach(function (key) {
      var e = data[key];
      if (!e) return;
      if (e.status === "posted")         posted++;
      else if (e.status === "confirmed") confirmed++;
      else                                planned++;
      if (e.platform === "TikTok")        tt++;
      else if (e.platform === "Instagram") ig++;
      else if (e.platform === "Both")      bo++;
    });
    var remaining = planned + confirmed;
    document.getElementById("stats").innerHTML =
      stat(planned, "Planned") +
      stat(confirmed, "Confirmed") +
      stat(posted, "Posted") +
      stat(remaining, "Remaining") +
      '<div class="stat divider"></div>' +
      '<div class="pf-legend">' +
        '<span><span class="dot tt"></span>TikTok ' + tt + "</span>" +
        '<span><span class="dot ig"></span>Instagram ' + ig + "</span>" +
        '<span><span class="dot bo"></span>Both ' + bo + "</span>" +
      "</div>";
  }
  function stat(num, lbl) {
    return '<div class="stat"><div class="num">' + num + '</div><div class="lbl">' + lbl + "</div></div>";
  }

  // Walk every card in storage (all weeks), group unique case+archetype combos by
  // product. Iterating PRODUCTS preserves the intentional case ordering on the page.
  function collectShootGroups() {
    var totalSlots = 0;
    var byProduct = {};
    Object.keys(data).forEach(function (key) {
      var e = data[key];
      if (!e || !e.product || !e.archetype) return;
      totalSlots++;
      var fn = shootFilename(e.product, e.archetype);
      if (!byProduct[e.product]) byProduct[e.product] = {};
      byProduct[e.product][fn] = true;
    });
    var groups = [];
    var uniqueCount = 0;
    PRODUCTS.forEach(function (p) {
      if (!byProduct[p]) return;
      var names = Object.keys(byProduct[p]).sort();
      uniqueCount += names.length;
      groups.push({ product: p, names: names });
      delete byProduct[p];
    });
    // Catch any custom product not in PRODUCTS, alphabetised at the end.
    Object.keys(byProduct).sort().forEach(function (p) {
      var names = Object.keys(byProduct[p]).sort();
      uniqueCount += names.length;
      groups.push({ product: p, names: names });
    });
    return { groups: groups, uniqueCount: uniqueCount, totalSlots: totalSlots };
  }

  function renderShootList() {
    var result = collectShootGroups();
    var countEl = document.getElementById("shootListCount");
    var bodyEl = document.getElementById("shootListBody");
    if (!countEl || !bodyEl) return;

    countEl.textContent =
      result.uniqueCount + " unique video" + (result.uniqueCount === 1 ? "" : "s") +
      " needed across " + result.totalSlots + " slot" + (result.totalSlots === 1 ? "" : "s");

    if (!result.groups.length) {
      bodyEl.innerHTML = '<p class="sl-empty">No cards yet — add a slot above to build your shoot list.</p>';
      return;
    }
    var html = "";
    result.groups.forEach(function (g) {
      html += '<div class="sl-group">' +
        '<div class="sl-group-head">' + esc(g.product.toUpperCase()) + '</div>' +
        '<ul class="sl-list">';
      g.names.forEach(function (fn) {
        html += '<li class="sl-item">' +
          '<span class="sl-name">' + esc(fn) + '</span>' +
          '<button type="button" class="sl-copy" data-fn="' + esc(fn) +
          '" title="Copy filename" aria-label="Copy filename">📋</button>' +
          '</li>';
      });
      html += '</ul></div>';
    });
    bodyEl.innerHTML = html;

    bodyEl.querySelectorAll(".sl-copy").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var text = btn.dataset.fn;
        if (!text || !navigator.clipboard) return;
        navigator.clipboard.writeText(text).then(function () {
          btn.textContent = "✓";
          btn.classList.add("copied");
          setTimeout(function () {
            btn.textContent = "📋";
            btn.classList.remove("copied");
          }, 1000);
        });
      });
    });
  }

  function shootListText() {
    var result = collectShootGroups();
    return result.groups.map(function (g) {
      return g.product.toUpperCase() + "\n" +
        g.names.map(function (n) { return "- " + n; }).join("\n");
    }).join("\n\n");
  }

  function quickAdd(archetype) {

      var d = addDays(weekStart, i);
      for (var s = 0; s < SLOTS.length; s++) {
        var key = slotKey(d, SLOTS[s].id);

  // pending video file path for the form being edited — file inputs can't be

  function openForm(key, presetArchetype) {

  // Video file: open the hidden file input when the button is clicked. Prefer the

  document.getElementById("contentForm").addEventListener("submit", function (ev) {

    };
    // If date or slot changed, vacate the old slot before writing the new key.
    // If the destination slot is occupied, the moved card replaces what was there.

  function soundSourceLabel(v) {

  document.getElementById("detailCopyVP").addEventListener("click", function () {

  function togglePosted(key) {

  }

    // Scheduled/posted cards are past the confirmation step — the checkmark is a no-op.

    e.status = current === "confirmed" ? "planned" : "confirmed";
    saveData();
    renderCalendar();

  function removeEntry(key) {

  // ---------- toast ----------
  var toastTimer = null;
  function showToast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");

  }

  // ---------- export ----------
  // Walks the live `data` map (which is the full localStorage payload — all weeks,
  // not just the visible one) and emits the JSON contract the Python poster expects.
  function exportForPosting() {
    var queue = [];
    Object.keys(data).forEach(function (key) {
      var e = data[key];
      if (!e || e.status !== "confirmed") return;
      var parts = key.split("__");
      var dateKey = parts[0];
      var timeKey = parts[1];
      queue.push({
        id: e.id,
        slotId: generateSlotId(e, key),
        dateKey: dateKey,
        timeKey: timeKey,
        platform: e.platform,
        product: e.product,
        archetype: e.archetype,
        caption: e.caption || "",
        sound: e.sound || "",
        soundSource: e.soundSource || "tiktok",
        videoFile: e.videoFilePath || "",
        scheduleDate: dateKey,
        scheduleTime: slotTime24(timeKey),
        status: e.status
      });
    });
    queue.sort(function (a, b) {
      if (a.scheduleDate !== b.scheduleDate) return a.scheduleDate < b.scheduleDate ? -1 : 1;
      return a.scheduleTime < b.scheduleTime ? -1 : 1;
    });

    var blob = new Blob([JSON.stringify(queue, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "posting-queue.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);

    showToast("Exported " + queue.length + " posts ready for scheduling 🎀");
  }

  // ---------- auto-match videos ----------
  // Filename-fuzzy-match rules. Order matters: more specific rules go first so a
  // pattern like "giftunbox" routes to Unboxing Surprise Gift instead of also
  // matching the broader "unbox" rule for ASMR Unboxing.
  var FILENAME_CASE_RULES = [
    { product: "Hello Kitty Cherry", patterns: ["hellokitty", "hello", "hkc"] },
    { product: "Bow Cherry",         patterns: ["bowcherry", "bow_cherry", "bcherry"] },
    { product: "Bow Diamond",        patterns: ["bowdiamond", "bow_diamond", "bdiamand"] },
    { product: "Bow Black",          patterns: ["bowblack", "bow_black", "bow-black", "blackbow"] },
    { product: "Butter Bear",        patterns: ["butterbear", "butter", "bbear"] },
    { product: "Cherry",             patterns: ["cherry"], exclude: ["bow", "hello"] },
    { product: "Dachshund",          patterns: ["dachshund", "dach"] },
    { product: "Mario",              patterns: ["mario"] },
    { product: "Wavy",               patterns: ["wavy"] },
    { product: "Puppy",              patterns: ["puppy"] },
    { product: "Burger",             patterns: ["burger"] }
  ];
  var FILENAME_CONCEPT_RULES = [
    { archetype: "Not Gatekeeping",                 patterns: ["notgatekeep", "not_gate"] },
    { archetype: "Cases I've Been Gatekeeping",     patterns: ["gatekeep"], exclude: ["notgatekeep", "not_gate"] },
    { archetype: "Unboxing Surprise Gift",          patterns: ["giftunbox", "gift", "surprise"] },
    { archetype: "ASMR Unboxing",                   patterns: ["asmr", "unbox"] },
    { archetype: "Outfit Swap Transition",          patterns: ["outfitswap", "swap"] },
    { archetype: "POV Outfit Match",                patterns: ["outfitmatch", "outfit", "pov"] },
    { archetype: "Before/After Ugly Case",          patterns: ["beforeafter", "ugly", "before", "glowup"] },
    { archetype: "Girl Math Comedy",                patterns: ["girlmath", "girl_math"] },
    { archetype: "Which One Matches Your Vibe",     patterns: ["whichone", "vibe"] },
    { archetype: "Rate My Phone Setup",             patterns: ["desksetup", "desk", "setup"] },
    { archetype: "Stitch Bait",                     patterns: ["stitch"] },
    { archetype: "GRWM Morning Routine",            patterns: ["grwm", "morning"] },
    { archetype: "Satisfying Loop Click",           patterns: ["satisfying", "loop", "click"] },
    { archetype: "Small Business BTS",              patterns: ["bts", "behind", "packing"] },
    { archetype: "Fruit Case Trend",                patterns: ["fruittrend", "fruit"] },
    { archetype: "My Boyfriend Hates It",           patterns: ["boyfriend"] },
    { archetype: "IT Girl Phone Check",             patterns: ["itgirl", "it_girl", "editorial"] },
    { archetype: "Canadian Small Business",         patterns: ["canadian"] },
    { archetype: "Compliment Magnet",               patterns: ["compliment"] },
    { archetype: "Nostalgia Hit",                   patterns: ["nostalgia"] },
    { archetype: "Hand Covers Camera Transition",   patterns: ["handtransition", "handcover", "hand"] },
    { archetype: "Falling Phone Transition",        patterns: ["fallingphone", "falling", "drop"] },
    { archetype: "PR Package Haul",                 patterns: ["prhaul", "pr_haul"] },
    { archetype: "Influencer Ranking Haul",         patterns: ["ranking"] },
    { archetype: "Honest Review 2 Weeks",           patterns: ["honestrev", "honest", "review"] },
    { archetype: "Should Be Illegal Hook",          patterns: ["illegal"] },
    { archetype: "Founder Story",                   patterns: ["founder", "brandintro"] },
    { archetype: "Didn't Know This Existed",        patterns: ["didntknow", "didnt"] }
  ];

  function applyFilenameRules(filename, rules, field) {
    var n = String(filename || "").toLowerCase();
    for (var i = 0; i < rules.length; i++) {
      var rule = rules[i];
      var hit = false;
      for (var j = 0; j < rule.patterns.length; j++) {
        if (n.indexOf(rule.patterns[j]) !== -1) { hit = true; break; }
      }
      if (!hit) continue;
      if (rule.exclude) {
        var excluded = false;
        for (var k = 0; k < rule.exclude.length; k++) {
          if (n.indexOf(rule.exclude[k]) !== -1) { excluded = true; break; }
        }
        if (excluded) continue;
      }
      return rule[field];
    }
    return null;
  }

  // Returns every archetype the filename "suggests" — order matters in the
  // rule list (specific first) so the FIRST hit is treated as the primary
  // signal. Used to score candidate cards.
  function detectFilenameConcepts(filename) {
    var n = String(filename || "").toLowerCase();
    var seen = {};
    var primary = null;
    for (var i = 0; i < FILENAME_CONCEPT_RULES.length; i++) {
      var rule = FILENAME_CONCEPT_RULES[i];
      if (rule.exclude) {
        var excluded = false;
        for (var k = 0; k < rule.exclude.length; k++) {
          if (n.indexOf(rule.exclude[k]) !== -1) { excluded = true; break; }
        }
        if (excluded) continue;
      }
      var hit = false;
      for (var j = 0; j < rule.patterns.length; j++) {
        if (n.indexOf(rule.patterns[j]) !== -1) { hit = true; break; }
      }
      if (hit) {
        seen[rule.archetype] = true;
        if (!primary) primary = rule.archetype;
      }
    }
    return { primary: primary, signals: Object.keys(seen) };
  }

  // Plan assignments without mutating `data`. Strategy:
  //   1. Resolve the file's case via FILENAME_CASE_RULES. No case → unmatched.
  //   2. Build the candidate pool: cards where status === "planned" AND
  //      videoFilePath is empty AND product === detected case. Already-
  //      confirmed and posted cards are excluded — case-locked, never
  //      overwritten.
  //   3. Score each candidate: 2 if its archetype equals the file's primary
  //      detected concept, 1 if it matches any of the file's other concept
  //      signals, 0 otherwise. Highest wins; ties broken by earliest slot key.
  //   4. Remove the chosen card from the pool so the next file picks a
  //      different one (one file → one card per round).
  function computeAutoMatchPlan(files) {
    var openByCase = {};
    Object.keys(data).forEach(function (k) {
      var e = data[k];
      if (!e || e.status !== "planned") return;
      if (e.videoFilePath) return;
      if (!openByCase[e.product]) openByCase[e.product] = [];
      openByCase[e.product].push({ key: k, entry: e });
    });
    Object.keys(openByCase).forEach(function (c) {
      openByCase[c].sort(function (a, b) { return a.key < b.key ? -1 : a.key > b.key ? 1 : 0; });
    });

    var assignments = [];
    var unmatched = [];

    for (var i = 0; i < files.length; i++) {
      var name = files[i].name;
      var caseName = applyFilenameRules(name, FILENAME_CASE_RULES, "product");
      if (!caseName) {
        unmatched.push({ file: name, reason: "couldn't detect case" });
        continue;
      }
      var candidates = openByCase[caseName] || [];
      if (candidates.length === 0) {
        unmatched.push({ file: name, reason: "no open " + caseName + " slots" });
        continue;
      }
      var concept = detectFilenameConcepts(name);
      var bestIdx = 0, bestScore = -1;
      for (var j = 0; j < candidates.length; j++) {
        var arch = candidates[j].entry.archetype;
        var score = 0;
        if (concept.primary === arch) score = 2;
        else if (concept.signals.indexOf(arch) !== -1) score = 1;
        if (score > bestScore) { bestScore = score; bestIdx = j; }
      }
      var chosen = candidates.splice(bestIdx, 1)[0];
      assignments.push({
        file: name,
        key: chosen.key,
        product: caseName,
        archetype: chosen.entry.archetype,
        primary: concept.primary,
        score: bestScore
      });
    }

    return { assignments: assignments, unmatched: unmatched };
  }

  function applyAutoMatchPlan(plan) {
    plan.assignments.forEach(function (a) {
      var e = data[a.key];
      if (!e) return;
      e.videoFilePath = a.file;
      e.status = "confirmed";
    });
    saveData();
    renderCalendar();
  }

  // Renders a preview into the round overlay and pre-arms `pendingRoundAction`
  // with the callback to run when the user clicks Continue. The same modal
  // serves auto-match and posting-round flows; only the title and callback
  // differ. `extras` may include { stillPlanned, skippedPosted, continueLabel }.
  function showAutoMatchPreview(plan, files, title, continueLabel, onConfirm, extras) {
    extras = extras || {};
    var html = '<p style="margin: 0 0 10px 0;">' +
      '<strong>✅ ' + plan.assignments.length + '</strong> file' +
      (plan.assignments.length === 1 ? "" : "s") + ' will be matched to slots<br>' +
      '<strong>⚠️ ' + plan.unmatched.length + '</strong> file' +
      (plan.unmatched.length === 1 ? "" : "s") + " couldn't be matched";
    if (typeof extras.skippedPosted === "number") {
      html += '<br><strong>⏭️ ' + extras.skippedPosted + '</strong> card' +
        (extras.skippedPosted === 1 ? "" : "s") + ' already posted (skipped)';
    }
    html += "</p>";

    if (plan.assignments.length) {
      html += '<h3 style="font-size:14px; margin: 14px 0 6px 0; color: var(--pink-dark);">Will assign:</h3>';
      html += '<ul style="margin: 0; padding-left: 18px;">';
      plan.assignments.forEach(function (a) {
        var hint = a.score === 2 ? " 🎯" :
                   a.score === 1 ? " (concept partial match)" :
                                   " (earliest slot, no concept match)";
        html += "<li>" + esc(a.file) + " → " + esc(humanContext(a.key)) + " — " +
          esc(a.product) + " + " + esc(a.archetype) + hint + "</li>";
      });
      html += "</ul>";
    }

    if (plan.unmatched.length) {
      html += '<h3 style="font-size:14px; margin: 14px 0 6px 0; color: #b91c1c;">Files I couldn\'t place:</h3>';
      html += '<ul style="margin: 0; padding-left: 18px;">';
      plan.unmatched.forEach(function (u) {
        html += "<li>" + esc(u.file) + " (" + esc(u.reason) + ")</li>";
      });
      html += "</ul>";
    }

    if (extras.stillPlanned && extras.stillPlanned.length) {
      html += '<h3 style="font-size:14px; margin: 14px 0 6px 0; color: var(--pink-dark);">Cards that will still need videos:</h3>';
      html += '<ul style="margin: 0; padding-left: 18px;">';
      extras.stillPlanned.forEach(function (s) {
        html += "<li>" + esc(humanContext(s.key)) + " — " +
          esc(s.entry.product) + " + " + esc(s.entry.archetype) + "</li>";
      });
      html += "</ul>";
    }

    if (extras.footerNote) {
      html += '<p style="margin: 14px 0 0 0; font-size: 12px; color: var(--muted);">' +
        extras.footerNote + "</p>";
    }

    document.getElementById("roundTitle").textContent = title;
    document.getElementById("roundCtx").textContent =
      "Reviewed " + files.length + " uploaded video" + (files.length === 1 ? "" : "s");
    document.getElementById("roundBody").innerHTML = html;
    var continueBtn = document.getElementById("roundContinue");
    continueBtn.style.display = plan.assignments.length ? "" : "none";
    continueBtn.textContent = continueLabel;
    pendingRoundAction = onConfirm;
    openOverlay("roundOverlay");
  }

  // Build the "after applying" list of planned cards that still have no
  // video. Used for the posting-round preview's footer.
  function plannedRemainingAfter(plan) {
    var claimed = {};
    plan.assignments.forEach(function (a) { claimed[a.key] = true; });
    var still = [];
    Object.keys(data).forEach(function (k) {
      var e = data[k];
      if (!e || e.status !== "planned") return;
      if (e.videoFilePath) return;
      if (claimed[k]) return;
      still.push({ key: k, entry: e });
    });
    still.sort(function (a, b) { return a.key < b.key ? -1 : a.key > b.key ? 1 : 0; });
    return still;
  }

  function countPostedCards() {
    var n = 0;
    Object.keys(data).forEach(function (k) {
      if (data[k] && data[k].status === "posted") n++;
    });
    return n;
  }

  function autoMatchVideos(files) {
    if (!files || !files.length) return;
    var plan = computeAutoMatchPlan(files);
    showAutoMatchPreview(
      plan, files, "Auto-match preview", "Confirm & Apply",
      function () {
        applyAutoMatchPlan(plan);
        showToast("Auto-matched " + plan.assignments.length + " slot" +
          (plan.assignments.length === 1 ? "" : "s") + " 🎬");
      },
      {}
    );
  }

  // ---------- posting round ----------
  // Strict status machine: planned → confirmed → posted.
  // A posting round only ever touches `planned` cards. `posted` cards are
  // walled off and never re-enter the round.
  function startPostingRound(files) {
    if (!files || !files.length) return;
    var plan = computeAutoMatchPlan(files);
    var stillPlanned = plannedRemainingAfter(plan);
    var skippedPosted = countPostedCards();
    showAutoMatchPreview(
      plan, files, "Posting round preview", "Continue & Export Queue",
      function () {
        applyAutoMatchPlan(plan);
        exportForPosting();
      },
      {
        stillPlanned: stillPlanned,
        skippedPosted: skippedPosted,
        footerNote: plan.assignments.length
          ? "Click Continue to download <code>posting-queue.json</code> for tiktok_poster.py."
          : ""
      }
    );
  }

  var pendingRoundAction = null;

  // ---------- sync posted status ----------
  // Reads a round-complete.json the Python poster wrote, finds matching
  // entries by id, flips them to posted. localStorage tracks the last
  // synced round's completedAt so re-picking the same file is a no-op.
  function syncPostedStatus(file) {
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function (ev) {
      var payload;
      try { payload = JSON.parse(ev.target.result); }
      catch (e) {
        alert("❌ Couldn't parse round-complete.json: " + e.message);
        return;
      }
      var completedAt = payload.completedAt || "";
      var slots = Array.isArray(payload.postedSlots) ? payload.postedSlots : [];
      if (!slots.length) {
        alert("round-complete.json had no posted slots — nothing to sync.");
        return;
      }

      // Dedup: if we've already synced this round, skip silently rather than
      // re-flipping (which is idempotent but confusing for the user).
      var lastSynced = "";
      try { lastSynced = localStorage.getItem("ck_last_round_synced") || ""; } catch (e) { /* ignore */ }
      if (completedAt && completedAt === lastSynced) {
        alert("This round was already synced — nothing to do.");
        return;
      }

      // Build id → key index once so we don't re-walk for every slot.
      var keyById = {};
      Object.keys(data).forEach(function (k) {
        var e = data[k];
        if (e && e.id) keyById[e.id] = k;
      });

      var marked = 0;
      var missing = [];
      slots.forEach(function (s) {
        var key = s.id ? keyById[s.id] : null;
        // Fall back to (dateKey, timeKey) lookup if id didn't match (e.g.,
        // the card was rebuilt by seedPlan between rounds).
        if (!key && s.dateKey && s.timeKey) {
          var probe = s.dateKey + "__" + s.timeKey;
          if (data[probe]) key = probe;
        }
        if (key && data[key]) {
          data[key].status = "posted";
          marked++;
        } else {
          missing.push(s);
        }
      });

      saveData();
      renderCalendar();
      try { localStorage.setItem("ck_last_round_synced", completedAt); } catch (e) { /* ignore */ }

      var msg = "✅ " + marked + " card" + (marked === 1 ? "" : "s") + " marked as posted from last round.";
      if (missing.length) {
        msg += "\n⚠️ " + missing.length + " slot" + (missing.length === 1 ? "" : "s") +
          " in round-complete.json had no matching calendar card.";
      }
      msg += "\n\nYou can now delete ~/Desktop/CaseKisses/round-complete.json " +
        "(the browser can't delete it directly).";
      alert(msg);
      showToast("Synced " + marked + " posted card" + (marked === 1 ? "" : "s") + " 📥");
    };
    reader.onerror = function () { alert("❌ Failed to read the file."); };
    reader.readAsText(file);
  }

  // ---------- overlays ----------
  function openOverlay(id) { document.getElementById(id).classList.add("open"); }
  function closeOverlay(id) { document.getElementById(id).classList.remove("open"); }
  function closeAllOverlays() {
    closeOverlay("formOverlay");
    closeOverlay("detailOverlay");
    closeOverlay("roundOverlay");
  }

  document.getElementById("formCancel").addEventListener("click", function () { closeOverlay("formOverlay"); });
  document.getElementById("detailClose").addEventListener("click", function () { closeOverlay("detailOverlay"); });
  document.getElementById("detailEdit").addEventListener("click", function () { if (detailKey) openForm(detailKey); });
  document.getElementById("detailDelete").addEventListener("click", function () { if (detailKey) removeEntry(detailKey); });
  document.getElementById("detailPosted").addEventListener("click", function () { if (detailKey) togglePosted(detailKey); });
  document.getElementById("exportBtn").addEventListener("click", exportForPosting);
  document.getElementById("autoMatchBtn").addEventListener("click", function () {
    document.getElementById("autoMatchInput").click();
  });
  document.getElementById("autoMatchInput").addEventListener("change", function (ev) {
    autoMatchVideos(ev.target.files);
    // Reset so picking the same files again still fires change.
    ev.target.value = "";
  });

  document.getElementById("startPostingBtn").addEventListener("click", function () {
    document.getElementById("startPostingInput").click();
  });
  document.getElementById("startPostingInput").addEventListener("change", function (ev) {
    startPostingRound(ev.target.files);
    ev.target.value = "";
  });

  document.getElementById("syncPostedBtn").addEventListener("click", function () {
    document.getElementById("syncPostedInput").click();
  });
  document.getElementById("syncPostedInput").addEventListener("change", function (ev) {
    var f = ev.target.files && ev.target.files[0];
    if (f) syncPostedStatus(f);
    ev.target.value = "";
  });

  document.getElementById("roundContinue").addEventListener("click", function () {
    closeOverlay("roundOverlay");
    var action = pendingRoundAction;
    pendingRoundAction = null;
    if (action) action();
  });
  document.getElementById("roundClose").addEventListener("click", function () {
    closeOverlay("roundOverlay");
    pendingRoundAction = null;
  });

  document.getElementById("shootListCopyAll").addEventListener("click", function () {
    var btn = this;
    var text = shootListText();
    if (!text || !navigator.clipboard) return;
    navigator.clipboard.writeText(text).then(function () {
      btn.classList.add("copied");
      var orig = btn.textContent;
      btn.textContent = "✓ Copied!";
      setTimeout(function () { btn.classList.remove("copied"); btn.textContent = orig; }, 1500);
      showToast("Shoot list copied to clipboard 🎬");
    });
  });

  ["formOverlay", "detailOverlay", "roundOverlay"].forEach(function (id) {
    document.getElementById(id).addEventListener("click", function (ev) {
      if (ev.target === this) closeOverlay(id);
    });
  });
  document.addEventListener("keydown", function (ev) {
    if (ev.key === "Escape") closeAllOverlays();
  });

  // ---------- nav ----------
  document.getElementById("prevWeek").addEventListener("click", function () { weekStart = addDays(weekStart, -7); renderCalendar(); });
  document.getElementById("nextWeek").addEventListener("click", function () { weekStart = addDays(weekStart, 7); renderCalendar(); });
  document.getElementById("todayBtn").addEventListener("click", function () { weekStart = startOfWeek(new Date()); renderCalendar(); });

  // ---------- init ----------
  fillSelect(document.getElementById("f-platform"), PLATFORMS);
  fillSelect(document.getElementById("f-product"), PRODUCTS);
  fillSelect(document.getElementById("f-archetype"), ARCHETYPES);
  fillStatus(document.getElementById("f-status"));

  seedPlan();
  data = loadData();
  renderCalendar();
})();
</script>
</body>
</html>
